<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>designwell</title>
    <link rel="preload" href="./fonts/CursorGothic-Regular.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="./fonts/CursorGothic-Bold.woff2" as="font" type="font/woff2" crossorigin />
    <style>
      /* relative ./fonts paths resolve under both dev root and the Pages subpath */
      @font-face {
        font-family: "Cursor Gothic";
        src: url("./fonts/CursorGothic-Regular.woff2") format("woff2");
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: "Cursor Gothic";
        src: url("./fonts/CursorGothic-Bold.woff2") format("woff2");
        font-weight: 700;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: "Cursor Gothic";
        src: url("./fonts/CursorGothic-Italic.woff2") format("woff2");
        font-weight: 400;
        font-style: italic;
        font-display: swap;
      }
      @font-face {
        font-family: "Cursor Gothic";
        src: url("./fonts/CursorGothic-BoldItalic.woff2") format("woff2");
        font-weight: 700;
        font-style: italic;
        font-display: swap;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
